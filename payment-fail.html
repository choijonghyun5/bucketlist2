<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <meta name="robots" content="noindex">

    <title>결제 실패</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div style="
        min-height:100vh;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        gap:20px;
        padding:24px;
        text-align:center;
    ">

        <div style="font-size:48px;">

            😢

        </div>

        <h2>

            결제가 완료되지 않았어요

        </h2>

        <p
            id="failMessage"
            style="color:var(--sub); max-width:320px;">

            결제가 취소되었거나 문제가 발생했어요.

        </p>

        <a
            href="index.html"
            style="
                display:inline-block;
                margin-top:12px;
                padding:14px 28px;
                border-radius:20px;
                background:var(--blue);
                color:#fff;
                text-decoration:none;
                font-weight:600;
            ">

            설정으로 돌아가기

        </a>

    </div>

    <script>

        const params = new URLSearchParams(window.location.search);

        const message = params.get("message");

        if(message){

            document.getElementById("failMessage").textContent = message;

        }

    </script>

</body>

</html>
