<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <meta
        name="theme-color"
        content="#F5F7FB">

    <title>Bucket</title>

    <link
        rel="stylesheet"
        href="style.css">

    <script
        src="https://accounts.google.com/gsi/client"
        async
        defer
        onload="if(window.onGisLoad){window.onGisLoad();}"></script>

</head>

<body>

    <!-- ========================= -->

    <!-- HEADER -->

    <!-- ========================= -->

    <header class="header">

        <div class="logo">

            Bucket<span>.</span>

        </div>

        <div class="headerButtons">

            <button id="themeButton">

                🌙

            </button>

        </div>

    </header>

    <!-- ========================= -->

    <!-- MAIN -->

    <!-- ========================= -->

    <main id="app">

        <!-- ========================= -->

        <!-- HOME -->

        <!-- ========================= -->

        <section
            id="homePage"
            class="page active">

            <div class="heroCard">

                <p
                    class="today"
                    id="todayDate">

                </p>

                <h1>

                    오늘도<br>

                    꿈을 이루어보세요.

                </h1>

                <div class="progressWrapper">

                    <div
                        class="progressCircle"
                        id="progressCircle">

                        <span id="progressPercent">

                            0%

                        </span>

                    </div>

                </div>

                <div class="heroStats">

                    <div class="statCard">

                        <h2 id="totalCount">

                            0

                        </h2>

                        <p>

                            전체

                        </p>

                    </div>

                    <div class="statCard">

                        <h2 id="doneCount">

                            0

                        </h2>

                        <p>

                            완료

                        </p>

                    </div>

                    <div class="statCard">

                        <h2 id="remainCount">

                            0

                        </h2>

                        <p>

                            남음

                        </p>

                    </div>

                </div>

            </div>

            <section class="quoteCard">

                <div class="quoteCardHeader">

                    <h3>

                        오늘의 문구

                    </h3>

                    <button
                        id="addQuoteButton"
                        class="quoteAddButton"
                        title="나만의 문구 추가">

                        +

                    </button>

                </div>

                <p id="todayQuote">

                </p>

            </section>

            <section class="recentCard">

                <h3>

                    최근 목표

                </h3>

                <div
                    id="recentBuckets">

                </div>

            </section>

        </section>

        <!-- ========================= -->

        <!-- BUCKET -->

        <!-- ========================= -->

        <section
            id="bucketPage"
            class="page">

            <div class="searchArea">

                <input
                    id="searchInput"
                    placeholder="버킷 검색">

                <button
                    id="sortButton">

                    ⇅

                </button>

            </div>

            <div
                class="categoryList"
                id="categoryList">

                <button
                    class="category active"
                    data-category="전체">

                    전체

                </button>

                <button
                    class="category"
                    data-category="여행">

                    여행

                </button>

                <button
                    class="category"
                    data-category="자기계발">

                    자기계발

                </button>

                <button
                    class="category"
                    data-category="건강">

                    건강

                </button>

                <button
                    class="category"
                    data-category="재테크">

                    재테크

                </button>

                <button
                    class="category"
                    data-category="취미">

                    취미

                </button>

                <button
                    class="category"
                    data-category="기타">

                    기타

                </button>

            </div>

            <div
                id="bucketList">

            </div>

        </section>

        <!-- ========================= -->

        <!-- GALLERY -->

        <!-- ========================= -->

        <section
            id="galleryPage"
            class="page">

            <div class="galleryHeader">

                <h2>

                    기념 앨범

                </h2>

                <p id="galleryCount">

                    0장

                </p>

            </div>

            <div
                id="galleryGrid"
                class="galleryGrid">

            </div>

        </section>

        <!-- ========================= -->

        <!-- STATS -->

        <!-- ========================= -->

        <section
            id="statsPage"
            class="page">

            <h2>

                통계

            </h2>

            <div
                id="statsContainer">

            </div>

        </section>

                <!-- ========================= -->
        <!-- SETTINGS -->
        <!-- ========================= -->

        <section
            id="settingsPage"
            class="page">

            <h2>

                설정

            </h2>

            <div class="settingsList">

                <button
                    class="settingItem"
                    id="toggleTheme">

                    <span>🌙 다크모드</span>

                    <span>›</span>

                </button>

                <button
                    class="settingItem"
                    id="googleDriveButton">

                    <span>☁️ 구글 드라이브 자동 저장</span>

                    <span class="driveStatusWrap">

                        <span id="googleDriveStatus">연결하기</span>

                        <small id="googleDriveTime"></small>

                    </span>

                </button>

                <button
                    class="settingItem"
                    id="togglePremium">

                    <span>✨ 프리미엄 (다중 사진)</span>

                    <span id="premiumStatus">무료</span>

                </button>

                <button
                    class="settingItem"
                    id="exportButton">

                    <span>📤 전체 백업</span>

                    <span>›</span>

                </button>

                <button
                    class="settingItem"
                    id="importButton">

                    <span>📥 전체 가져오기</span>

                    <span>›</span>

                </button>

                <input
                    type="file"
                    id="importFile"
                    accept=".json"
                    hidden>

                <button
                    class="settingItem"
                    id="exportPhotosButton">

                    <span>🖼 사진만 백업</span>

                    <span>›</span>

                </button>

                <button
                    class="settingItem"
                    id="importPhotosButton">

                    <span>📥 사진만 가져오기</span>

                    <span>›</span>

                </button>

                <input
                    type="file"
                    id="importPhotosFile"
                    accept=".json"
                    hidden>

                <button
                    class="settingItem danger"
                    id="deleteAllButton">

                    <span>🗑 전체 삭제</span>

                    <span>›</span>

                </button>

            </div>

            <div class="appInfo">

                <h3>

                    Bucket v0.3

                </h3>

                <p>

                    나만의 버킷리스트를 기록하고
                    목표를 달성해보세요.

                </p>

            </div>

        </section>

    </main>

    <!-- ========================= -->
    <!-- ADD BUTTON -->
    <!-- ========================= -->

    <button
        id="addButton"
        class="fab">

        +

    </button>

    <!-- ========================= -->
    <!-- ADD / EDIT MODAL -->
    <!-- ========================= -->

    <div
        class="modal"
        id="bucketModal">

        <div class="modalSheet">

            <div class="sheetHeader">

                <h2 id="modalTitle">

                    새 버킷리스트

                </h2>

            </div>

            <div class="inputGroup">

                <label>

                    제목

                </label>

                <input
                    id="titleInput"
                    placeholder="예) 오로라 보기">

            </div>

            <div class="inputGroup">

                <label>

                    카테고리

                </label>

                <select
                    id="categoryInput">

                    <option>여행</option>
                    <option>자기계발</option>
                    <option>건강</option>
                    <option>재테크</option>
                    <option>취미</option>
                    <option>기타</option>

                </select>

            </div>

            <div class="doubleRow">

                <div class="inputGroup">

                    <label>

                        목표 날짜

                    </label>

                    <input
                        type="date"
                        id="dateInput">

                </div>

                <div class="inputGroup">

                    <label>

                        중요도

                    </label>

                    <select
                        id="starInput">

                        <option value="false">

                            일반

                        </option>

                        <option value="true">

                            ⭐ 중요

                        </option>

                    </select>

                </div>

            </div>

            <div class="inputGroup">

                <label>

                    메모

                </label>

                <textarea
                    id="memoInput"
                    rows="5"
                    placeholder="메모를 입력하세요."></textarea>

            </div>

            <div class="modalButtons">

                <button
                    id="saveButton"
                    class="primaryButton">

                    저장

                </button>

                <button
                    id="cancelButton"
                    class="secondaryButton">

                    취소

                </button>

            </div>

        </div>

    </div>

    <!-- ========================= -->
    <!-- QUOTE MODAL -->
    <!-- ========================= -->

    <div
        class="modal"
        id="quoteModal">

        <div class="modalSheet">

            <div class="sheetHeader">

                <h2>

                    나만의 문구

                </h2>

            </div>

            <div class="inputGroup">

                <label>

                    새 문구 입력

                </label>

                <textarea
                    id="quoteTextInput"
                    rows="3"
                    placeholder="예) 나만의 응원 문구를 적어보세요."></textarea>

            </div>

            <div class="modalButtons">

                <button
                    id="quoteAddSaveButton"
                    class="primaryButton">

                    추가

                </button>

                <button
                    id="quoteCloseButton"
                    class="secondaryButton">

                    닫기

                </button>

            </div>

            <div
                id="myQuoteList"
                class="myQuoteList">

            </div>

        </div>

    </div>

    <!-- ========================= -->
    <!-- COMPLETE CELEBRATION MODAL -->
    <!-- ========================= -->

    <div
        class="modal"
        id="celebrateModal">

        <div class="modalSheet">

            <div class="sheetHeader celebrateHeader">

                <div class="celebrateEmoji">🎉</div>

                <h2 id="celebrateTitle">

                    목표 달성!

                </h2>

                <p class="celebrateSub">

                    기념 사진을 남겨보세요.

                </p>

            </div>

            <div class="inputGroup">

                <label id="photoInputLabel">

                    기념 사진 (선택)

                </label>

                <p
                    class="photoLimitHint"
                    id="photoLimitHint">

                </p>

                <label
                    class="photoUpload"
                    id="photoUploadArea">

                    <input
                        type="file"
                        id="photoInput"
                        accept="image/*"
                        hidden>

                    <div
                        class="photoPlaceholder"
                        id="photoPlaceholder">

                        <span>📷</span>

                        <p>

                            탭해서 사진 선택

                        </p>

                    </div>

                    <img
                        id="photoPreview"
                        class="photoPreview hidden"
                        alt="기념 사진 미리보기">

                </label>

                <div
                    id="photoPreviewGrid"
                    class="photoPreviewGrid hidden">

                </div>

            </div>

            <div class="modalButtons">

                <button
                    id="celebrateSaveButton"
                    class="primaryButton">

                    완료 저장

                </button>

                <button
                    id="celebrateSkipButton"
                    class="secondaryButton">

                    사진 없이 완료

                </button>

            </div>

        </div>

    </div>

    <!-- ========================= -->
    <!-- PHOTO VIEW MODAL -->
    <!-- ========================= -->

    <div
        class="modal photoViewModal"
        id="photoViewModal">

        <div class="photoViewContent">

            <button
                id="closePhotoView"
                class="photoViewClose">

                ✕

            </button>

            <img
                id="photoViewImage"
                alt="기념 사진">

            <p id="photoViewTitle"></p>

            <p
                id="photoViewBucket"
                class="photoViewBucket">

            </p>

            <div class="photoViewActions">

                <button
                    id="replacePhotoButton"
                    class="photoActionButton replace">

                    교체

                </button>

                <button
                    id="deletePhotoButton"
                    class="photoActionButton delete">

                    삭제

                </button>

            </div>

            <input
                type="file"
                id="replacePhotoInput"
                accept="image/*"
                hidden>

        </div>

    </div>

    <!-- ========================= -->
    <!-- BOTTOM NAVIGATION -->
    <!-- ========================= -->

    <nav class="bottomNav">

        <button
            class="navButton active"
            data-page="homePage">

            <span>🏠</span>

            <small>홈</small>

        </button>

        <button
            class="navButton"
            data-page="bucketPage">

            <span>🎯</span>

            <small>버킷</small>

        </button>

        <button
            class="navButton"
            data-page="galleryPage">

            <span>📷</span>

            <small>앨범</small>

        </button>

        <button
            class="navButton"
            data-page="statsPage">

            <span>📊</span>

            <small>통계</small>

        </button>

        <button
            class="navButton"
            data-page="settingsPage">

            <span>⚙️</span>

            <small>설정</small>

        </button>

    </nav>

    <script src="app.js"></script>

</body>

</html>
